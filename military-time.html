<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Military Time Converter</title>

<style>
    body {
        background: #ffffff;
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    #converter-container {
        width: 340px;
        height: 480px;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    /* Remove InchCalculator branding header/footer */
    #inch-calculator-icwh,
    #inch-calculator-icwf {
        display: none !important;
    }
</style>
</head>

<body>
    <div id="converter-container">
        <div
            id="inch-calculator-icw"
            data-ct="military_time"
            data-cw="320"
            data-ch="450"
            data-cv="MTE3NjUxMzU0MTQ="
        ></div>
    </div>

    <script src="https://cdn.inchcalculator.com/e/widgets.min.js" async defer></script>
</body>
</html>
